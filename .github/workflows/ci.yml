name: SQA CI & CT Pipeline
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup PHP Environment
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3' # Disamakan dengan versi laptopmu (PHP 8.3)
        coverage: xdebug
        extensions: mbstring, xml, ctype

    - name: Install PHP Dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run PHPUnit & Quality Metrics
      # Menambahkan flag --fail-on-warning agar jika ada warning/error kecil, server langsung otomatis MERAH
      run: vendor/bin/phpunit --coverage-text --fail-on-warning

    - name: Setup Node.js for Cypress
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install NPM Dependencies
      run: npm ci || npm install

    - name: Start PHP Server in Background
      run: php -S 127.0.0.1:8000 &

    - name: Run Cypress E2E Tests (System Testing)
      uses: cypress-io/github-action@v6
      with:
        wait-on: 'http://127.0.0.1:8000'